{% extends 'forms.html' %}

{% block title %}
Sign Up
{% endblock %}

{% block body %}

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">
                <div class="card-header text-center">
                    <h3>Create Account</h3>
                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">
                                Username
                            </label>
                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                placeholder="Enter Username"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Email Address
                            </label>
                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                placeholder="Enter Email"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Password
                            </label>
                            <input
                                type="password"
                                name="password1"
                                class="form-control"
                                placeholder="Enter Password"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Confirm Password
                            </label>
                            <input
                                type="password"
                                name="password2"
                                class="form-control"
                                placeholder="Confirm Password"
                                required>
                        </div>

                        <button
                            type="submit"
                            class="btn btn-success w-100">
                            Sign Up
                        </button>

                    </form>

                    <div class="text-center mt-3">
                        <a href="/login">
                            Already have an account? Login
                        </a>
                    </div>

                </div>
            </div>

        </div>

    </div>
</div>

{% endblock %}
